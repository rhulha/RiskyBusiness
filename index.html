<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Board</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #1a1a2e;
            font-family: sans-serif;
        }
        #info {
            color: #e0e0e0;
            font-size: 18px;
            margin-bottom: 10px;
            min-height: 26px;
            letter-spacing: 1px;
        }
        .svgContainer {
            width: 90vw;
            height: 85vh;
            border: 2px solid #444;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            background: #2a6099;
            overflow: hidden;
        }
        .svgContainer svg {
            width: 100%;
            height: 100%;
        }
        /* Make all country paths clickable across their full area */
        #layer4 path {
            pointer-events: all;
            cursor: pointer;
            fill: transparent;
            transition: fill 0.15s;
        }
        #layer4 path.selected {
            fill: rgba(255, 220, 0, 0.55);
        }
        #layer4 path:hover {
            fill: rgba(255, 255, 255, 0.25);
        }
        #layer4 path.selected:hover {
            fill: rgba(255, 220, 0, 0.7);
        }
    </style>
</head>
<body>
    <div id="info">Click a territory</div>
    <div class="svgContainer" id="svgContainer"></div>

    <script type="module">
        const COUNTRIES = new Set([
            'alaska', 'northwest_territory', 'greenland', 'alberta',
            'ontario', 'quebec', 'western_united_states', 'eastern_united_states',
            'central_america',
            'venezuela', 'peru', 'brazil', 'argentina',
            'iceland', 'great_britain', 'western_europe', 'northern_europe',
            'scandinavia', 'ukraine', 'southern_europe',
            'north_africa', 'egypt', 'east_africa', 'congo',
            'south_africa', 'madagascar',
            'ural', 'siberia', 'yakursk', 'irkutsk', 'kamchatka',
            'afghanistan', 'middle_east', 'india', 'siam',
            'china', 'mongolia', 'japan',
            'indonesia', 'new_guinea', 'western_australia', 'eastern_australia',
        ]);

        const DISPLAY_NAMES = {
            alaska: 'Alaska',
            northwest_territory: 'Northwest Territory',
            greenland: 'Greenland',
            alberta: 'Alberta',
            ontario: 'Ontario',
            quebec: 'Quebec',
            western_united_states: 'Western United States',
            eastern_united_states: 'Eastern United States',
            central_america: 'Central America',
            venezuela: 'Venezuela',
            peru: 'Peru',
            brazil: 'Brazil',
            argentina: 'Argentina',
            iceland: 'Iceland',
            great_britain: 'Great Britain',
            western_europe: 'Western Europe',
            northern_europe: 'Northern Europe',
            scandinavia: 'Scandinavia',
            ukraine: 'Ukraine',
            southern_europe: 'Southern Europe',
            north_africa: 'North Africa',
            egypt: 'Egypt',
            east_africa: 'East Africa',
            congo: 'Congo',
            south_africa: 'South Africa',
            madagascar: 'Madagascar',
            ural: 'Ural',
            siberia: 'Siberia',
            yakursk: 'Yakutsk',
            irkutsk: 'Irkutsk',
            kamchatka: 'Kamchatka',
            afghanistan: 'Afghanistan',
            middle_east: 'Middle East',
            india: 'India',
            siam: 'Siam',
            china: 'China',
            mongolia: 'Mongolia',
            japan: 'Japan',
            indonesia: 'Indonesia',
            new_guinea: 'New Guinea',
            western_australia: 'Western Australia',
            eastern_australia: 'Eastern Australia',
        };

        const info = document.getElementById('info');
        const container = document.getElementById('svgContainer');

        const resp = await fetch('Risk_board.svg');
        const svgText = await resp.text();
        container.innerHTML = svgText;

        const svg = container.querySelector('svg');

        let selected = null;

        svg.addEventListener('click', e => {
            let el = e.target;
            while (el && el !== svg) {
                if (COUNTRIES.has(el.id)) {
                    if (selected && selected !== el) {
                        selected.classList.remove('selected');
                    }
                    el.classList.toggle('selected');
                    selected = el.classList.contains('selected') ? el : null;
                    info.textContent = selected
                        ? `Selected: ${DISPLAY_NAMES[el.id] ?? el.id}`
                        : 'Click a territory';
                    return;
                }
                el = el.parentElement;
            }
        });
    </script>
</body>
</html>
